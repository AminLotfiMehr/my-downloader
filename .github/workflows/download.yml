name: ⬇️ GitHub Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 Download URLs (space separated)'
        required: true
        type: string
      mode:
        description: '📦 Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 ZIP password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max for large files
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          mkdir -p downloads tmp_downloads
          
          download_file() {
            local URL="$1"
            local FILENAME=$(basename "$URL" | sed 's/[?#].*//' | sed 's/[<>:"|?*]/_/g')
            [ -z "$FILENAME" ] && FILENAME="download_$(date +%s)"
            
            echo "Downloading: $URL -> $FILENAME"
            
            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --min-split-size=20M \
              --max-tries=5 \
              --retry-wait=10 \
              --timeout=60 \
              --connect-timeout=30 \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --dir="tmp_downloads" \
              --out="$FILENAME" \
              "$URL"
            
            if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              return 0
            else
              # Fallback to curl
              curl -L --retry 5 --retry-delay 10 --max-time 7200 \
                -o "tmp_downloads/$FILENAME" "$URL"
              return $?
            fi
          }
          
          for URL in $URLS; do
            download_file "$URL"
          done
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              mkdir -p "downloads/$ARCHIVE_NAME"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                  "downloads/$ARCHIVE_NAME/$ARCHIVE_NAME.zip" \
                  tmp_downloads/*
              else
                zip -j -s ${SPLIT_THRESHOLD_MB}m \
                  "downloads/$ARCHIVE_NAME/$ARCHIVE_NAME.zip" \
                  tmp_downloads/*
              fi
            fi
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              [ -s "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              SIZE=$(stat -c%s "$FILE")
              
              FOLDER_NAME="${BASENAME_NO_EXT}_$(date +%Y%m%d_%H%M%S)"
              mkdir -p "downloads/$FOLDER_NAME"
              
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "File >${SPLIT_THRESHOLD_MB}MB, splitting..."
                
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
                
                # Create README for split archive
                cat > "downloads/$FOLDER_NAME/README.md" << EOF
# $BASENAME

Split archive (${SPLIT_THRESHOLD_MB}MB parts)

## Download Links

Download all parts (\`.zip\`, \`.z01\`, \`.z02\`...) and open the main \`.zip\` file with any archive manager.

## Original URL
\`$URL\`
EOF
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" \
                    "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j \
                    "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
              fi
            done
            rm -rf tmp_downloads
          fi
          
          echo "Download completed successfully"

      - name: Update main README
        run: |
          cat > README.md << 'EOF'
# GitHub Downloader

A tool to download files using GitHub Actions, especially useful when direct access is restricted.

## How to use

1. Go to **Actions** tab
2. Select **"GitHub Downloader"** workflow
3. Click **"Run workflow"**
4. Enter your download URLs
5. Click **"Run workflow"** button

## Downloaded files

Check the `downloads/` folder in this repository.
EOF
          
          # List downloaded folders
          echo "" >> README.md
          echo "## Download History" >> README.md
          echo "" >> README.md
          
          for folder in downloads/*/; do
            if [ -d "$folder" ]; then
              folder_name=$(basename "$folder")
              echo "- [$folder_name](./downloads/$folder_name)" >> README.md
            fi
          done

      - name: Commit and push
        run: |
          git add downloads/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
