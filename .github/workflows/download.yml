name: GitHub Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URLs (space separated)'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'ZIP password (optional)'
        required: false
        type: string

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc

      - name: Download and Process Files
        id: download
        run: |
          set -e
          
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          if [ -z "$URLS" ]; then
            echo "ERROR: No URLs provided!"
            exit 1
          fi

          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          RELEASE_DIR="release_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$RELEASE_DIR"
          mkdir -p tmp_downloads

          echo "========================================="
          echo "GitHub Downloader Starting"
          echo "Mode: $MODE"
          echo "URLs: $URLS"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          echo "========================================="

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2" 2>/dev/null

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"

              aria2c \
                --split=4 \
                --max-connection-per-server=4 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=10 \
                --timeout=60 \
                --connect-timeout=30 \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL" 2>&1

              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true
                echo "Download successful: $FILENAME"
                break
              fi

              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2" 2>/dev/null
              echo "Retrying with curl..."

              curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0" \
                -o "tmp_downloads/$FILENAME" \
                "$URL" 2>&1

              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true
                echo "Download successful: $FILENAME"
                break
              fi

              rm -f "tmp_downloads/$FILENAME" 2>/dev/null
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done

            if [ "$SUCCESS" = true ]; then
              return 0
            else
              echo "Download failed: $FILENAME"
              return 1
            fi
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            [ -z "$FILENAME" ] && FILENAME="download_${COUNTER}"
            echo "Downloading $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "Failed to download: $FILENAME"
          done

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            [ -s "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            BASENAME_NO_EXT="${BASENAME%.*}"

            FOLDER_NAME=$(get_unique_folder "$RELEASE_DIR" "$BASENAME_NO_EXT")
            FOLDER_PATH="$RELEASE_DIR/$FOLDER_NAME"
            mkdir -p "$FOLDER_PATH"

            if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "$BASENAME - splitting into ${SPLIT_THRESHOLD_MB}MB parts"
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "$FOLDER_PATH/$FOLDER_NAME.zip" "$FILE" 2>/dev/null
              else
                zip -j -s ${SPLIT_THRESHOLD_MB}m "$FOLDER_PATH/$FOLDER_NAME.zip" "$FILE" 2>/dev/null
              fi
            else
              echo "$BASENAME - creating zip archive"
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" "$FOLDER_PATH/$FOLDER_NAME.zip" "$FILE" 2>/dev/null
              else
                zip -j "$FOLDER_PATH/$FOLDER_NAME.zip" "$FILE" 2>/dev/null
              fi
            fi

            echo "# $BASENAME_NO_EXT" > "$FOLDER_PATH/README.md"
            echo "" >> "$FOLDER_PATH/README.md"
            echo "Original File: $BASENAME" >> "$FOLDER_PATH/README.md"
            echo "Total Size: $(( SIZE / 1024 / 1024 )) MB" >> "$FOLDER_PATH/README.md"
            echo "" >> "$FOLDER_PATH/README.md"
            echo "## Download Links" >> "$FOLDER_PATH/README.md"
            echo "" >> "$FOLDER_PATH/README.md"

            for part_file in $(ls "$FOLDER_PATH/"*.zip "$FOLDER_PATH/"*.z[0-9]* 2>/dev/null | sort); do
              if [ -f "$part_file" ]; then
                PART_NAME=$(basename "$part_file")
                echo "- $PART_NAME" >> "$FOLDER_PATH/README.md"
              fi
            done

            echo "" >> "$FOLDER_PATH/README.md"
            echo "How to Extract: Download all parts and open the .zip file." >> "$FOLDER_PATH/README.md"

            echo "Created: $FOLDER_NAME"
          done

          rm -rf tmp_downloads
          echo "$RELEASE_DIR" > /tmp/release_dir.txt
          echo "Processing completed"

      - name: Create GitHub Release and Upload
        run: |
          RELEASE_DIR=$(cat /tmp/release_dir.txt)
          
          TAG_NAME="download-$(date +%Y%m%d-%H%M%S)"
          RELEASE_NAME="Downloaded Files - $(date +'%Y-%m-%d %H:%M:%S')"
          
          gh release create "$TAG_NAME" --title "$RELEASE_NAME" --notes "Downloaded from: ${{ github.event.inputs.urls }}"
          
          echo "Release created: $TAG_NAME"
          echo "Uploading files..."
          
          for folder in "$RELEASE_DIR"/*/; do
            if [ -d "$folder" ]; then
              for file in "$folder"/*; do
                if [ -f "$file" ]; then
                  gh release upload "$TAG_NAME" "$file" --clobber
                fi
              done
            fi
          done
          
          echo "Success! Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
