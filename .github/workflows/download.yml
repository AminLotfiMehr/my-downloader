name: GitHub Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URLs (space separated)'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'ZIP password (optional)'
        required: false
        type: string

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl

      - name: Download files
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          MAIN_DIR="downloads"
          mkdir -p "$MAIN_DIR"
          
          clean_name() {
            echo "$1" | sed 's|https\?://||' | sed 's|/|_|g' | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-60
          }
          
          COUNTER=1
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "$URL" ]; then
              FILENAME="download_${COUNTER}"
            fi
            
            FOLDER_NAME=$(clean_name "$FILENAME")
            if [ -d "$MAIN_DIR/$FOLDER_NAME" ]; then
              FOLDER_NAME="${FOLDER_NAME}_${COUNTER}"
            fi
            
            FOLDER_PATH="$MAIN_DIR/$FOLDER_NAME"
            mkdir -p "$FOLDER_PATH"
            
            echo "Downloading: $URL"
            echo "Target: $FOLDER_PATH/$FILENAME"
            
            aria2c -x 4 -s 4 -k 20M --max-tries=5 --retry-wait=10 --allow-overwrite=true -d "$FOLDER_PATH" -o "$FILENAME" "$URL" 2>/dev/null || curl -L --retry 5 -o "$FOLDER_PATH/$FILENAME" "$URL"
            
            if [ -f "$FOLDER_PATH/$FILENAME" ] && [ -s "$FOLDER_PATH/$FILENAME" ]; then
              SIZE=$(stat -c%s "$FOLDER_PATH/$FILENAME" 2>/dev/null || echo "0")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              printf '# Download: %s\n\n' "$FILENAME" > "$FOLDER_PATH/README.md"
              printf '## Download Information\n\n' >> "$FOLDER_PATH/README.md"
              printf '| Property | Value |\n' >> "$FOLDER_PATH/README.md"
              printf '|----------|-------|\n' >> "$FOLDER_PATH/README.md"
              printf '| Source URL | %s |\n' "$URL" >> "$FOLDER_PATH/README.md"
              printf '| Filename | `%s` |\n' "$FILENAME" >> "$FOLDER_PATH/README.md"
              printf '| Size | %s MB |\n' "$SIZE_MB" >> "$FOLDER_PATH/README.md"
              printf '| Download Date | %s |\n' "$(date '+%Y-%m-%d %H:%M:%S UTC')" >> "$FOLDER_PATH/README.md"
              printf '\n---\n*Downloaded by GitHub Downloader*\n' >> "$FOLDER_PATH/README.md"
              
              echo "Downloaded: $FILENAME"
            else
              echo "Failed: $FILENAME"
              echo "Download failed for: $URL" > "$FOLDER_PATH/ERROR.txt"
            fi
            
            COUNTER=$((COUNTER + 1))
          done
          
          printf '# Downloads\n\n' > "$MAIN_DIR/README.md"
          printf 'This folder contains files downloaded by GitHub Downloader.\n\n' >> "$MAIN_DIR/README.md"
          printf '## Folders\n\n' >> "$MAIN_DIR/README.md"
          
          for folder in "$MAIN_DIR"/*/; do
            if [ -d "$folder" ]; then
              folder_name=$(basename "$folder")
              printf -- '- [%s](%s/)\n' "$folder_name" "$folder_name" >> "$MAIN_DIR/README.md"
            fi
          done

      - name: Commit and push
        run: |
          git pull origin "${GITHUB_REF_NAME}" --rebase || true
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
            echo "Push successful"
          else
            echo "No changes to commit"
          fi
