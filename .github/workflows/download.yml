name: ⬇️ GitHub Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        type: string

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl

      - name: Download and organize
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          # پوشه اصلی دانلود (ریشه پروژه)
          MAIN_DOWNLOAD_DIR="downloads"
          mkdir -p "$MAIN_DOWNLOAD_DIR"
          
          clean_name() {
            echo "$1" | sed 's|https\?://||' | sed 's|/|_|g' | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-80
          }
          
          COUNTER=1
          for URL in $URLS; do
            # استخراج نام فایل از لینک
            FILENAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "$URL" ]; then
              FILENAME="download_${COUNTER}"
            fi
            
            # نام پوشه (نام لینک)
            FOLDER_NAME=$(clean_name "$FILENAME")
            # اگر تکراری بود، شماره اضافه کن
            if [ -d "$MAIN_DOWNLOAD_DIR/$FOLDER_NAME" ]; then
              FOLDER_NAME="${FOLDER_NAME}_${COUNTER}"
            fi
            
            FOLDER_PATH="$MAIN_DOWNLOAD_DIR/$FOLDER_NAME"
            mkdir -p "$FOLDER_PATH"
            
            echo "📥 Downloading: $URL"
            echo "📁 Target folder: $FOLDER_PATH"
            
            # دانلود فایل
            aria2c -x 4 -s 4 -k 20M \
              --max-tries=5 \
              --retry-wait=10 \
              --allow-overwrite=true \
              -d "$FOLDER_PATH" -o "$FILENAME" "$URL" 2>/dev/null || \
            curl -L --retry 5 -o "$FOLDER_PATH/$FILENAME" "$URL"
            
            if [ -f "$FOLDER_PATH/$FILENAME" ] && [ -s "$FOLDER_PATH/$FILENAME" ]; then
              SIZE=$(stat -c%s "$FOLDER_PATH/$FILENAME" 2>/dev/null || echo "0")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              # ساخت فایل README داخل پوشه
              cat > "$FOLDER_PATH/README.md" << EOF
# Download: $FILENAME

## 📥 Download Information

| Property | Value |
|----------|-------|
| **Source URL** | $URL |
| **Filename** | \`$FILENAME\` |
| **Size** | ${SIZE_MB} MB |
| **Download Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |

## 🔗 Original Link

\`$URL\`

---
*Downloaded by GitHub Downloader*
EOF
              echo "✅ Downloaded: $FILENAME → $FOLDER_PATH/"
            else
              echo "❌ Failed: $FILENAME"
              echo "Failed to download: $URL" > "$FOLDER_PATH/ERROR.txt"
            fi
            
            COUNTER=$((COUNTER + 1))
          done
          
          # آپدیت README اصلی پوشه downloads
          cat > "$MAIN_DOWNLOAD_DIR/README.md" << EOF
# 📥 Downloaded Files

This folder contains files downloaded by the GitHub Downloader workflow.

## 📁 Folders

EOF
          
          for folder in "$MAIN_DOWNLOAD_DIR"/*/; do
            if [ -d "$folder" ]; then
              folder_name=$(basename "$folder")
              echo "- [$folder_name]($folder_name/)" >> "$MAIN_DOWNLOAD_DIR/README.md"
            fi
          done

      - name: Commit and push downloads
        run: |
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "📥 Add downloaded files [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
            echo "✅ Downloads pushed successfully"
          else
            echo "ℹ️ No new downloads to push"
          fi
