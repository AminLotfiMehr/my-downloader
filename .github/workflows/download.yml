name: "Download URL"

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک های دانلود (برای چند لینک با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت خروجی'
        required: false
        default: 'zip'
        type: choice
        options:
          - zip
          - single
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      URLS: ${{ github.event.inputs.urls }}
      MODE: ${{ github.event.inputs.mode }}
      ZIP_PASSWORD: ${{ github.event.inputs.password }}

    steps:

      # ─────────────────────────────────────────────
      # 1. بررسی ورودی
      # ─────────────────────────────────────────────
      - name: Check URL provided
        run: |
          if [ -z "$URLS" ]; then
            echo "لینک دانلود وارد نشده است!"
            echo "راهنما: workflow را دوباره اجرا کنید و لینک را وارد کنید"
            exit 1
          fi
          echo "لینک دانلود دریافت شد"

      # ─────────────────────────────────────────────
      # 2. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 3. تنظیم Git برای فایل های بزرگ
      # ─────────────────────────────────────────────
      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      # ─────────────────────────────────────────────
      # 4. نصب ابزارها
      # ─────────────────────────────────────────────
      - name: Install aria2 and zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 zip curl bc

      # ─────────────────────────────────────────────
      # 5. برچسب نویسنده
      # ─────────────────────────────────────────────
      - name: AminLotfiMehr Downloader
        run: |
          echo "AminLotfiMehr - Your Download Solution"
          echo "https://github.com/AminLotfiMehr"

      # ─────────────────────────────────────────────
      # 6. دانلود فایل ها
      # ─────────────────────────────────────────────
      - name: Download files
        run: |
          set -euo pipefail

          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          trap 'rm -rf tmp_downloads' EXIT

          echo "Mode: $MODE  |  Split: ${SPLIT_THRESHOLD_MB}MB"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads

          # ── توابع کمکی ──────────────────────────────────────────────────

          RANDOM_WORDS=(alpha beta gamma delta epsilon zeta theta kappa lambda sigma omega nova star moon sun sky cloud river ocean mountain)

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1" NAME="$2" RANDOM_SUFFIX
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          urlencode() {
            python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"
          }

          # ── ساخت README برای خطا ────────────────────────────────────────
          write_readme_error() {
            local OUT="$1" FNAME="$2" ERR="$3" FURL="$4" DT
            DT=$(date '+%Y-%m-%d %H:%M:%S UTC')
            printf '# %s - Download Failed\n\n---\n\n## Download Information\n\n' "$FNAME" > "$OUT"
            printf '| Property | Value |\n|----------|-------|\n' >> "$OUT"
            printf '| **File** | `%s` |\n' "$FNAME" >> "$OUT"
            printf '| **URL** | %s |\n' "$FURL" >> "$OUT"
            printf '| **Date** | %s |\n' "$DT" >> "$OUT"
            printf '| **Status** | **FAILED** |\n\n---\n\n## Error Details\n\n```\n' >> "$OUT"
            printf '%s\n' "$ERR" >> "$OUT"
            printf '```\n\n---\n\n## Possible Solutions\n\n' >> "$OUT"
            printf '- Check if the URL is correct and accessible\n' >> "$OUT"
            printf '- The file may have been removed or moved\n' >> "$OUT"
            printf '- The server may require authentication\n' >> "$OUT"
            printf '- Some servers block automated downloads (403 Forbidden)\n' >> "$OUT"
            printf '- Try again later if it is a temporary server issue\n\n---\n\n' >> "$OUT"
            printf '*This tool created by [Amin.lotfi1987@gmail.com]*\n' >> "$OUT"
          }

          create_error_file() {
            local FILENAME="$1" ERROR_MSG="$2" FURL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}" FOLDER_NAME
            FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            write_readme_error "$BACKUP_DIR/$FOLDER_NAME/README.md" "$FILENAME" "$ERROR_MSG" "$FURL"
            echo "Error file created: $BACKUP_DIR/$FOLDER_NAME/README.md"
          }

          # ── ساخت README آرشیو ZIP چند پارت ────────────────────────────
          write_readme_zip_multi() {
            local OUT="$1" ARCHIVE_NAME="$2" SIZE_MB="$3" LINK_NUM="$4" LINKS="$5" PP="$6"
            printf '# %s Archive\n\n---\n\n## Download Information\n\n' "$ARCHIVE_NAME" > "$OUT"
            printf '| Property | Value |\n|----------|-------|\n' >> "$OUT"
            printf '| **Archive Name** | `%s.zip` |\n' "$ARCHIVE_NAME" >> "$OUT"
            printf '| **Total Size** | %s MB (%s parts) |\n' "$SIZE_MB" "$LINK_NUM" >> "$OUT"
            printf '| **Status** | **Complete (100%%)** |\n' >> "$OUT"
            printf '| **Password Protected** | **%s** |\n\n---\n\n' "$PP" >> "$OUT"
            printf '## Download Links\n\n| # | File | Link |\n|---|------|------|\n' >> "$OUT"
            printf '%s' "$LINKS" >> "$OUT"
            printf '\n---\n\n## How to Extract\n\n' >> "$OUT"
            printf '1. Download all parts (.zip, .z01, .z02 ...)\n' >> "$OUT"
            printf '2. Open %s.zip with WinRAR, 7-Zip, or Ark\n' "$ARCHIVE_NAME" >> "$OUT"
            printf '3. Extract - all parts combine automatically\n' >> "$OUT"
            if [ "$PP" = "YES" ]; then
              printf '4. Enter the password when prompted\n' >> "$OUT"
            fi
            printf '\n---\n\n*This tool created by [Amin.lotfi1987@gmail.com]*\n' >> "$OUT"
          }

          # ── ساخت README فایل تک بزرگ split شده ────────────────────────
          write_readme_single_split() {
            local OUT="$1" BASENAME="$2" FOLDER_NAME="$3" SIZE_MB="$4" LINK_NUM="$5" LINKS="$6" PP="$7"
            printf '# %s - Split Archive\n\n---\n\n## Download Information\n\n' "$BASENAME" > "$OUT"
            printf '| Property | Value |\n|----------|-------|\n' >> "$OUT"
            printf '| **Original File** | `%s` |\n' "$BASENAME" >> "$OUT"
            printf '| **Total Size** | %s MB (%s parts) |\n' "$SIZE_MB" "$LINK_NUM" >> "$OUT"
            printf '| **Status** | **Complete (100%%)** |\n' >> "$OUT"
            printf '| **Password Protected** | **%s** |\n\n---\n\n' "$PP" >> "$OUT"
            printf '## Download Links\n\n| # | File | Link |\n|---|------|------|\n' >> "$OUT"
            printf '%s' "$LINKS" >> "$OUT"
            printf '\n---\n\n## How to Extract\n\n' >> "$OUT"
            printf '1. Download all parts (.zip, .z01, .z02 ...)\n' >> "$OUT"
            printf '2. Open %s.zip with WinRAR, 7-Zip, or Ark\n' "$FOLDER_NAME" >> "$OUT"
            printf '3. Extract - all parts combine automatically\n' >> "$OUT"
            if [ "$PP" = "YES" ]; then
              printf '4. Enter the password when prompted\n' >> "$OUT"
            fi
            printf '\n---\n\n*This tool created by [Amin.lotfi1987@gmail.com]*\n' >> "$OUT"
          }

          # ── ساخت README فایل تک کوچک ────────────────────────────────────
          write_readme_single_small() {
            local OUT="$1" BASENAME="$2" SIZE_MB="$3" RAW_LINK="$4" PP="$5"
            printf '# %s\n\n---\n\n## Download Information\n\n' "$BASENAME" > "$OUT"
            printf '| Property | Value |\n|----------|-------|\n' >> "$OUT"
            printf '| **Original File** | `%s` |\n' "$BASENAME" >> "$OUT"
            printf '| **Size** | %s MB |\n' "$SIZE_MB" >> "$OUT"
            printf '| **Status** | **Complete (100%%)** |\n' >> "$OUT"
            printf '| **Password Protected** | **%s** |\n\n---\n\n' "$PP" >> "$OUT"
            printf '## Download Link\n\n| File | Link |\n|------|------|\n' >> "$OUT"
            printf '| `%s` | [Download](%s) |\n\n---\n\n' "$BASENAME" "$RAW_LINK" >> "$OUT"
            printf '*This tool created by [Amin.lotfi1987@gmail.com]*\n' >> "$OUT"
          }

          # ── دانلود با تلاش مجدد ─────────────────────────────────────────
          download_with_retry() {
            local URL="$1" FILENAME="$2"
            local MAX_RETRIES=3 RETRY_DELAY=5 SUCCESS=false ERROR_LOG="" FILE_SIZE

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt/$MAX_RETRIES for $FILENAME"
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

              ERROR_LOG=$(aria2c \
                --split=2 --max-connection-per-server=2 --min-split-size=20M \
                --max-tries=3 --retry-wait=5 --timeout=60 --connect-timeout=30 \
                --follow-torrent=false --check-certificate=false \
                --allow-overwrite=true --auto-file-renaming=false \
                --dir="tmp_downloads" --out="$FILENAME" "$URL" 2>&1 || true)

              FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
              if [ -f "tmp_downloads/$FILENAME" ] && [ "$FILE_SIZE" -gt 0 ]; then
                SUCCESS=true
                echo "aria2c OK: $FILENAME (${FILE_SIZE} bytes)"
                break
              fi

              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
              echo "aria2c failed, trying curl..."

              ERROR_LOG=$(curl -L -f -# --retry 3 --retry-delay 5 \
                --connect-timeout 30 --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "tmp_downloads/$FILENAME" "$URL" 2>&1 || true)

              FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
              if [ -f "tmp_downloads/$FILENAME" ] && [ "$FILE_SIZE" -gt 0 ]; then
                SUCCESS=true
                echo "curl OK: $FILENAME (${FILE_SIZE} bytes)"
                break
              fi

              rm -f "tmp_downloads/$FILENAME"
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s..."
              sleep "$RETRY_DELAY"
              RETRY_DELAY=$(( RETRY_DELAY * 2 ))
            done

            local FINAL_SIZE
            FINAL_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
            if [ "$SUCCESS" = true ] && [ "$FINAL_SIZE" -gt 0 ]; then
              echo "Downloaded: $FILENAME ($FINAL_SIZE bytes)"
              return 0
            fi

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            create_error_file "$FILENAME" \
              "Download failed after $MAX_RETRIES attempts. Last error: $ERROR_LOG" "$URL"
            return 1
          }

          # ── حلقه دانلود ─────────────────────────────────────────────────
          read -ra URL_ARRAY <<< "$URLS"
          for URL in "${URL_ARRAY[@]}"; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g; s/%2F/-/g; s/[?#].*//')
            FILENAME=$(printf '%s' "$FILENAME" | sed 's/[<>:"|?*\\]/_/g')
            [ -z "$FILENAME" ] && FILENAME="downloaded_file_$RANDOM"
            echo "Downloading: $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "FAILED: $FILENAME"
          done

          # مقدار PASS_PROTECTED برای توابع README
          if [ -n "$ZIP_PASSWORD" ]; then PASS_PROTECTED="YES"; else PASS_PROTECTED="NO"; fi

          # ── پردازش فایل ها بر اساس حالت ────────────────────────────────
          if [ "$MODE" = "zip" ]; then

            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$ARCHIVE_NAME")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"

              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                else
                  echo "Skipping: $f"
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                ARCHIVE_PATH="$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s "${SPLIT_THRESHOLD_MB}m" "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                else
                  zip -j -s "${SPLIT_THRESHOLD_MB}m" "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                fi

                PARTS=$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null || true)
                if [ -z "$PARTS" ]; then
                  echo "ERROR: Archive not created!"
                  rm -f "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}".*
                else
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  TOTAL_ARCHIVE_SIZE=0

                  while IFS= read -r part_file; do
                    [ -f "$part_file" ] || continue
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$(( LINK_NUM + 1 ))
                    DOWNLOAD_LINKS_MD+="$(printf '| %s | `%s` | [Download](%s) |\n' "$LINK_NUM" "$PART_BASENAME" "$RAW_LINK")"
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_ARCHIVE_SIZE=$(( TOTAL_ARCHIVE_SIZE + PART_SIZE ))
                  done < <(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort)

                  ARCHIVE_SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE / 1024 / 1024" | bc)
                  write_readme_zip_multi \
                    "$BACKUP_DIR/$FOLDER_NAME/README.md" \
                    "$ARCHIVE_NAME" "$ARCHIVE_SIZE_MB" "$LINK_NUM" \
                    "$DOWNLOAD_LINKS_MD" "$PASS_PROTECTED"
                fi
              else
                echo "No valid files to archive!"
              fi
            fi

          else
            # ── حالت Single ─────────────────────────────────────────────

            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue

              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
              if [ "$SIZE" -le 0 ]; then
                echo "WARNING: Skipping empty: $FILE"
                rm -f "$FILE"
                continue
              fi

              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")

              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting..."
                ARCHIVE_BASE="$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}"

                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s "${SPLIT_THRESHOLD_MB}m" "${ARCHIVE_BASE}.zip" "$FILE"
                else
                  zip -j -s "${SPLIT_THRESHOLD_MB}m" "${ARCHIVE_BASE}.zip" "$FILE"
                fi

                PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)

                if [ "$PARTS_COUNT" -eq 0 ]; then
                  echo "ERROR: Splitting failed for $BASENAME"
                  create_error_file "$BASENAME" "Splitting failed" ""
                else
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  TOTAL_SIZE_PARTS=0

                  while IFS= read -r part_file; do
                    [ -f "$part_file" ] || continue
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$(( LINK_NUM + 1 ))
                    DOWNLOAD_LINKS_MD+="$(printf '| %s | `%s` | [Download](%s) |\n' "$LINK_NUM" "$PART_BASENAME" "$RAW_LINK")"
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_SIZE_PARTS=$(( TOTAL_SIZE_PARTS + PART_SIZE ))
                  done < <(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort)

                  SIZE_MB=$(echo "scale=2; $TOTAL_SIZE_PARTS / 1024 / 1024" | bc)
                  write_readme_single_split \
                    "$BACKUP_DIR/$FOLDER_NAME/README.md" \
                    "$BASENAME" "$FOLDER_NAME" "$SIZE_MB" "$LINK_NUM" \
                    "$DOWNLOAD_LINKS_MD" "$PASS_PROTECTED"
                fi

              else
                cp "$FILE" "$BACKUP_DIR/$FOLDER_NAME/$BASENAME"
                FILE_ENCODED=$(urlencode "${BASENAME}")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"
                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                write_readme_single_small \
                  "$BACKUP_DIR/$FOLDER_NAME/README.md" \
                  "$BASENAME" "$SIZE_MB" "$RAW_LINK" "$PASS_PROTECTED"
                echo "Copied $BASENAME to backup"
              fi
            done
          fi

          echo ""
          echo "===== Backup folder contents ====="
          find "$BACKUP_DIR" -type f | head -50

      # ─────────────────────────────────────────────
      # 7. بروزرسانی README
      # ─────────────────────────────────────────────
      - name: Update README.md with download links
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          urlencode() {
            python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"
          }

          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ -n "$(ls -A "$BACKUP_DIR" 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi

          # downloads/README.md
          {
            printf '# Downloaded list :\n\n'
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              printf '- [%s](./%s)\n' "$FOLDER" "$FOLDER_ENCODED"
            done
            printf '\n---\n\n*This tool created by [Amin.lotfi1987@gmail.com]*\n'
          } > "downloads/README.md"
          echo "downloads/README.md updated"

          # README.md ریشه
          SECTION_TITLE="فایل های دانلود شده در گیتهاب شما :"

          if [ ! -f "README.md" ]; then
            printf '# AminLotfiMehr Downloader\n\nAmin.lotfi1987@gmail.com\n\n' > README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            printf '\n---\n\n## %s\n\n' "$SECTION_TITLE"
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              printf '%s. [%s](%s/%s)\n\n' "$COUNTER" "$FOLDER" "$REPO_URL" "$FOLDER_ENCODED"
              COUNTER=$(( COUNTER + 1 ))
            done
            printf '---\n'
          } >> README.md

          echo "README.md updated"

      # ─────────────────────────────────────────────
      # 8. Commit و Push تدریجی
      # ─────────────────────────────────────────────
      - name: Incremental Commit and Push
        run: |
          set -uo pipefail

          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          AUTHOR="Amin.lotfi1987@gmail.com"

          echo "$AUTHOR - Incremental Push Mode"

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          echo "Total files in backup: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            DOWNLOAD_FILE_COUNT=$(find downloads -type f 2>/dev/null | wc -l)
            if [ "$DOWNLOAD_FILE_COUNT" -eq 0 ]; then
              echo "Nothing to push"
              exit 0
            fi
          fi

          urlencode() {
            python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"
          }

          # ── بازسازی downloads/README.md ──────────────────────────────────
          regenerate_downloads_readme() {
            local DOWNLOADS_README="downloads/README.md"
            printf '# Downloaded list :\n\n' > "$DOWNLOADS_README"
            for folder in downloads/*/; do
              [ -d "$folder" ] || continue
              local FOLDER_NAME FOLDER_ENCODED
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              printf '- [%s](./%s)\n' "$FOLDER_NAME" "$FOLDER_ENCODED" >> "$DOWNLOADS_README"
            done
            printf '\n---\n\n*This tool created by [Amin.lotfi1987@gmail.com]*\n' >> "$DOWNLOADS_README"
            echo "Downloads README regenerated"
          }

          # ── تابع push امن ────────────────────────────────────────────────
          safe_push() {
            local COMMIT_MSG="$1"
            shift
            local FILES_TO_ADD=("$@")
            local PUSH_RETRY=0 MAX_PUSH=5

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard "origin/$BRANCH" 2>/dev/null || true
            mkdir -p downloads
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

            for f in "${FILES_TO_ADD[@]}"; do
              git add -f "$f" 2>/dev/null || true
            done

            if git diff --cached --quiet 2>/dev/null; then
              echo "  No changes to commit."
              return 0
            fi

            git commit -m "$COMMIT_MSG" --quiet 2>/dev/null || true

            while [ $PUSH_RETRY -lt $MAX_PUSH ]; do
              PUSH_RETRY=$(( PUSH_RETRY + 1 ))
              if timeout 180 git push origin "HEAD:$BRANCH" 2>&1; then
                echo "  Push successful! (attempt $PUSH_RETRY)"
                return 0
              fi
              echo "  Push failed, attempt $PUSH_RETRY/$MAX_PUSH..."
              sleep $(( 3 + RANDOM % 7 ))
              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard "origin/$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
              for f in "${FILES_TO_ADD[@]}"; do
                git add -f "$f" 2>/dev/null || true
              done
              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "$COMMIT_MSG" --quiet 2>/dev/null || true
              fi
            done

            echo "  WARNING: Push failed after $MAX_PUSH attempts"
            return 1
          }

          # ── push دسته ای بر اساس حجم ────────────────────────────────────
          push_batch() {
            local MAX_BATCH_BYTES=$(( 80 * 1024 * 1024 ))
            local FILES=("$@")
            local BATCH_FILES=() BATCH_BYTES=0 BATCH_NUM=0
            local TOTAL_PUSHED=0 TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              local FSIZE
              FSIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
              BATCH_FILES+=("$FILE")
              BATCH_BYTES=$(( BATCH_BYTES + FSIZE ))

              if [ "$BATCH_BYTES" -ge "$MAX_BATCH_BYTES" ]; then
                BATCH_NUM=$(( BATCH_NUM + 1 ))
                TOTAL_PUSHED=$(( TOTAL_PUSHED + ${#BATCH_FILES[@]} ))
                echo ""
                echo ">>> Pushing batch #$BATCH_NUM ($TOTAL_PUSHED/$TOTAL_FILES, ~$(( BATCH_BYTES / 1024 / 1024 ))MB)..."
                safe_push "[$AUTHOR] Add batch #$BATCH_NUM [skip ci]" "${BATCH_FILES[@]}"
                BATCH_FILES=()
                BATCH_BYTES=0
                sleep 2
              fi
            done

            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              BATCH_NUM=$(( BATCH_NUM + 1 ))
              TOTAL_PUSHED=$(( TOTAL_PUSHED + ${#BATCH_FILES[@]} ))
              echo ""
              echo ">>> Pushing final batch #$BATCH_NUM ($TOTAL_PUSHED/$TOTAL_FILES)..."
              safe_push "[$AUTHOR] Add final batch [skip ci]" "${BATCH_FILES[@]}"
            fi
          }

          # ── آماده سازی و اجرا ────────────────────────────────────────────
          echo ""
          echo "=========================================="
          echo "Starting incremental push process..."
          echo "=========================================="

          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          ALL_FILES=()
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -name "README.md" -print0 2>/dev/null)

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f \
              \( -name "*.zip" -o -name "*.z[0-9][0-9]" -o -name "*.z[0-9]" \
                 -o -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" \
                 -o -name "*.exe" -o -name "*.iso" \
                 -o -name "*.tar*" -o -name "*.rar" \) \
              -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Found $TOTAL_FILES files to push"

          if [ "$TOTAL_FILES" -eq 0 ]; then
            git add README.md 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[$AUTHOR] Update README [skip ci]"
              timeout 120 git push origin "HEAD:$BRANCH" || true
            fi
            echo "No download files to push!"
            exit 0
          fi

          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            [ -f "$F" ] || continue
            FSIZE=$(stat -c%s "$F" 2>/dev/null || echo 0)
            TOTAL_SIZE=$(( TOTAL_SIZE + FSIZE ))
          done
          TOTAL_SIZE_MB=$(( TOTAL_SIZE / 1024 / 1024 ))
          echo "Total size: ${TOTAL_SIZE_MB}MB"

          if [ "$TOTAL_SIZE_MB" -lt 100 ]; then
            echo "Small upload - pushing all at once..."
            safe_push "[$AUTHOR] Downloaded files [skip ci]" "downloads/" "README.md"
          else
            echo "Large upload (${TOTAL_SIZE_MB}MB) - using incremental batch push..."
            push_batch "${ALL_FILES[@]}"
            echo ""
            echo "Pushing README files..."
            regenerate_downloads_readme
            safe_push "[$AUTHOR] Update download list [skip ci]" "downloads/README.md" "README.md"
          fi

          echo ""
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "AminLotfiMehr"
          echo "=========================================="
