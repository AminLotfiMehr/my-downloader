name: Web Scraper

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scrape'
        required: true
        type: string
        default: 'https://huggingface.co/bartowski/Llama-3.2-1B-Instruct-GGUF'
      file_extensions:
        description: 'File extensions (comma separated - LEAVE EMPTY for ALL files)'
        required: false
        default: ''
        type: string
      min_file_size_mb:
        description: 'Minimum file size in MB (0 = no limit)'
        required: false
        default: '0'
        type: string
      max_file_size_mb:
        description: 'Maximum file size in MB (0 = no limit)'
        required: false
        default: '0'
        type: string
      max_pages:
        description: 'Maximum number of files to show (0 = unlimited)'
        required: false
        default: '0'
        type: string
      show_all_links:
        description: 'Show all links (ignore extension filter)'
        required: false
        type: boolean
        default: false
      recursive_depth:
        description: 'Recursive depth (0=current page only)'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl bc

      - name: Scrape website
        id: scrape
        run: |
          TARGET_URL="${{ github.event.inputs.target_url }}"
          EXTENSIONS="${{ github.event.inputs.file_extensions }}"
          MIN_SIZE_MB="${{ github.event.inputs.min_file_size_mb }}"
          MAX_SIZE_MB="${{ github.event.inputs.max_file_size_mb }}"
          MAX_PAGES="${{ github.event.inputs.max_pages }}"
          SHOW_ALL="${{ github.event.inputs.show_all_links }}"
          DEPTH="${{ github.event.inputs.recursive_depth }}"
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          MAIN_DIR="Scraped"
          mkdir -p "$MAIN_DIR"
          
          CLEAN_NAME=$(echo "$TARGET_URL" | sed 's|https\?://||' | sed 's|/|_|g' | sed 's|[^a-zA-Z0-9._-]|_|g' | cut -c1-50)
          SESSION_NAME="scrape_${TIMESTAMP}_${CLEAN_NAME}"
          SESSION_PATH="$MAIN_DIR/$SESSION_NAME"
          mkdir -p "$SESSION_PATH"
          
          echo "========================================="
          echo "Web Scraper Starting"
          echo "URL: $TARGET_URL"
          echo "Session: $SESSION_PATH"
          echo "========================================="
          
          # Save config
          cat > "$SESSION_PATH/scrape_config.json" << EOF
          {
            "target_url": "$TARGET_URL",
            "file_extensions": "$EXTENSIONS",
            "min_file_size_mb": $MIN_SIZE_MB,
            "max_file_size_mb": $MAX_SIZE_MB,
            "max_pages": $MAX_PAGES,
            "show_all_links": $SHOW_ALL,
            "recursive_depth": $DEPTH,
            "scrape_time": "$(date -Iseconds)"
          }
          EOF
          
          format_size() {
            local bytes=$1
            if [ -z "$bytes" ] || [ "$bytes" = "0" ]; then
              echo "Unknown"
            elif [ $bytes -gt 1073741824 ]; then
              echo "$(echo "scale=2; $bytes / 1073741824" | bc) GB"
            elif [ $bytes -gt 1048576 ]; then
              echo "$(echo "scale=2; $bytes / 1048576" | bc) MB"
            else
              echo "$(echo "scale=2; $bytes / 1024" | bc) KB"
            fi
          }
          
          touch "$SESSION_PATH/download_links.txt"
          touch "$SESSION_PATH/download_links_with_size.txt"
          
          # HuggingFace scraping
          if [[ "$TARGET_URL" == *"huggingface.co"* ]]; then
            echo "Detected HuggingFace URL"
            MODEL_PATH=$(echo "$TARGET_URL" | sed 's|https://huggingface.co/||' | sed 's|/tree/.*||' | sed 's|/blob/.*||' | sed 's|/resolve/.*||')
            MODEL_PATH=$(echo "$MODEL_PATH" | cut -d'?' -f1)
            
            echo "Model path: $MODEL_PATH"
            
            # Fetch all files via API
            curl -sL "https://huggingface.co/api/models/$MODEL_PATH" | jq -r '.siblings[].rfilename' > "$SESSION_PATH/all_files.txt" 2>/dev/null
            curl -sL "https://huggingface.co/api/datasets/$MODEL_PATH" | jq -r '.siblings[].rfilename' >> "$SESSION_PATH/all_files.txt" 2>/dev/null
            
            sort -u "$SESSION_PATH/all_files.txt" -o "$SESSION_PATH/all_files.txt"
            
            TOTAL=$(wc -l < "$SESSION_PATH/all_files.txt")
            echo "Total files found: $TOTAL"
            
            # Filter by extensions
            if [ "$SHOW_ALL" = "true" ] || [ -z "$EXTENSIONS" ]; then
              cp "$SESSION_PATH/all_files.txt" "$SESSION_PATH/filtered_files.txt"
              echo "Including ALL files"
            else
              EXT_PATTERN=$(echo "$EXTENSIONS" | sed 's/,/\\|/g')
              grep -E -i "$EXT_PATTERN" "$SESSION_PATH/all_files.txt" > "$SESSION_PATH/filtered_files.txt" || true
              echo "Filtered by: $EXTENSIONS"
            fi
            
            COUNTER=0
            while IFS= read -r file; do
              if [ -n "$file" ]; then
                ENCODED=$(echo "$file" | sed 's/ /%20/g')
                FILE_URL="https://huggingface.co/$MODEL_PATH/resolve/main/$ENCODED"
                
                SIZE_BYTES=$(curl -sI -L "$FILE_URL" | grep -i "^content-length:" | awk '{print $2}' | tr -d '\r')
                SIZE_READABLE=$(format_size "$SIZE_BYTES")
                SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
                
                SIZE_OK=true
                [ "$MIN_SIZE_MB" != "0" ] && [ "$SIZE_MB" -lt "$MIN_SIZE_MB" ] && SIZE_OK=false
                [ "$MAX_SIZE_MB" != "0" ] && [ "$SIZE_MB" -gt "$MAX_SIZE_MB" ] && SIZE_OK=false
                
                if [ "$SIZE_OK" = true ]; then
                  if [ "$MAX_PAGES" = "0" ] || [ $COUNTER -lt $MAX_PAGES ]; then
                    echo "$FILE_URL|$SIZE_READABLE|$SIZE_MB|$file" >> "$SESSION_PATH/download_links_with_size.txt"
                    echo "$FILE_URL" >> "$SESSION_PATH/download_links.txt"
                    COUNTER=$((COUNTER + 1))
                    echo "Added: $file ($SIZE_READABLE)"
                  fi
                fi
              fi
            done < "$SESSION_PATH/filtered_files.txt"
          fi
          
          LINK_COUNT=$(wc -l < "$SESSION_PATH/download_links.txt" 2>/dev/null | tr -d ' ')
          echo "link_count=${LINK_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "session_path=$SESSION_PATH" >> $GITHUB_OUTPUT
          
          # Create folders for each link
          if [ -s "$SESSION_PATH/download_links_with_size.txt" ]; then
            COUNTER=1
            while IFS='|' read -r url size_display size_mb filename; do
              if [ -n "$url" ]; then
                BASENAME=$(basename "$filename")
                [ -z "$BASENAME" ] && BASENAME="link_$COUNTER"
                FOLDER_NAME=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-60)
                FOLDER_PATH="$SESSION_PATH/$FOLDER_NAME"
                mkdir -p "$FOLDER_PATH"
                
                cat > "$FOLDER_PATH/README.md" << EOF
# Download Link: $BASENAME

## Link Information

| Property | Value |
|----------|-------|
| Source URL | $TARGET_URL |
| Direct Link | [$url]($url) |
| Filename | \`$BASENAME\` |
| **File Size** | **$size_display** |
| Scraped at | $(date '+%Y-%m-%d %H:%M:%S UTC') |

## How to Download

1. Copy this URL: \`$url\`
2. Go to Actions -> GitHub Downloader
3. Paste the URL and run

---
*Scraped by GitHub Actions*
EOF
                
                cat > "$FOLDER_PATH/link_info.json" << EOF
{
  "index": $COUNTER,
  "filename": "$BASENAME",
  "direct_url": "$url",
  "file_size": "$size_display",
  "file_size_mb": $size_mb,
  "source_url": "$TARGET_URL",
  "scrape_time": "$(date -Iseconds)"
}
EOF
                
                echo "Created: $FOLDER_NAME"
                COUNTER=$((COUNTER + 1))
              fi
            done < "$SESSION_PATH/download_links_with_size.txt"
          fi
          
          ACTUAL_COUNT=$((COUNTER - 1))
          
          # Master summary
          cat > "$SESSION_PATH/MASTER_SUMMARY.md" << EOF
# Web Scraper Results

## Configuration

| Parameter | Value |
|-----------|-------|
| Source URL | $TARGET_URL |
| File Extensions | ${EXTENSIONS:-ALL FILES} |
| Min File Size | $MIN_SIZE_MB MB |
| Max File Size | $MAX_SIZE_MB MB |
| Max Pages | $MAX_PAGES |
| Show All Links | $SHOW_ALL |
| Recursive Depth | $DEPTH |
| Scrape Time | $(date '+%Y-%m-%d %H:%M:%S UTC') |
| **Links Found** | **$ACTUAL_COUNT** |
EOF
          
          echo "Scraping complete. Found $ACTUAL_COUNT links."

      - name: Display results in job summary
        run: |
          echo "## Web Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source URL | ${{ github.event.inputs.target_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Links Found | ${{ steps.scrape.outputs.link_count }} |" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push
        run: |
          git add Scraped/ --force
          if ! git diff --cached --quiet; then
            git commit -m "Add scraped data [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_id }}
          path: Scraped/
          retention-days: 7
